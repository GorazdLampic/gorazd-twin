<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00d4ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gorazd Twin">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>Gorazd Lampic — Digital Twin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    height: 100vh; display: flex; flex-direction: column;
}

/* ─── MODE BAR ─── */
.mode-bar {
    display: flex; align-items: center; background: #050505;
    border-bottom: 1px solid #1a1a1a; padding: 0;
}
.mode-tab {
    flex: 1; padding: 10px 0; text-align: center;
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    border-bottom: 3px solid transparent; transition: all 0.2s;
    color: #555; background: none; border-top: none; border-left: none; border-right: none;
}
.mode-tab:hover { color: #999; }
.mode-tab.active[data-mode="develop"] {
    color: #ff9500; border-bottom-color: #ff9500;
}
.mode-tab.active[data-mode="live"] {
    color: #00d4ff; border-bottom-color: #00d4ff;
}
.qa-count {
    display: inline-block; background: #333; color: #aaa;
    border-radius: 10px; padding: 1px 8px; font-size: 11px;
    margin-left: 6px; font-weight: 400;
}

/* ─── HEADER ─── */
.header {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 24px; background: #111; border-bottom: 1px solid #222;
}
.avatar {
    width: 56px; height: 56px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--accent);
}
.header-text h1 { font-size: 17px; color: var(--accent); }
.header-text p { font-size: 12px; color: #888; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.status-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.status-label { font-size: 11px; color: #888; }
.config-toggle {
    background: none; border: none; color: #555; font-size: 18px;
    cursor: pointer; padding: 4px 8px;
}

/* ─── DEV TOOLBAR ─── */
.dev-toolbar {
    display: none; padding: 10px 24px; background: #0d0800;
    border-bottom: 1px solid #332200; gap: 8px; align-items: center;
    flex-wrap: wrap;
}
.dev-toolbar.visible { display: flex; }
.dev-toolbar .stats {
    font-size: 12px; color: #cc8800; flex: 1;
}
.dev-toolbar button {
    padding: 6px 14px; border: none; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
}
.btn-dev { background: #332200; color: #ff9500; }
.btn-dev:hover { background: #443300; }
.btn-danger { background: #331111; color: #ff4444; }
.btn-danger:hover { background: #441818; }
.category-select {
    background: #1a1a2e; border: 1px solid #332200; border-radius: 6px;
    padding: 5px 10px; color: #ff9500; font-size: 12px;
}

/* ─── CONFIG PANEL ─── */
.config-panel {
    display: none; padding: 20px 24px; background: #111;
    border-bottom: 1px solid #222;
}
.config-panel.visible { display: block; }
.config-panel label { display: block; color: #888; font-size: 13px; margin-bottom: 4px; }
.config-panel input {
    width: 100%; background: #1a1a2e; border: 1px solid #333;
    border-radius: 8px; padding: 8px 12px; color: #e0e0e0;
    font-size: 14px; margin-bottom: 12px;
}
.config-panel button {
    background: var(--accent); color: #0a0a0a; border: none;
    border-radius: 8px; padding: 10px 20px; font-weight: 600;
    cursor: pointer;
}

/* ─── CHAT ─── */
.chat {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 16px;
}
.msg {
    max-width: 80%; padding: 12px 16px; border-radius: 12px;
    line-height: 1.6; font-size: 15px; white-space: pre-wrap;
}
.msg.user {
    background: #1a2a4a; color: #c8d8f8; align-self: flex-end;
    border-bottom-right-radius: 4px;
}
.msg.assistant {
    background: #1a1a2e; color: #e0e0e0; align-self: flex-start;
    border-bottom-left-radius: 4px; border: 1px solid #252540;
}
.msg.interviewer {
    background: #1a1200; color: #ffe0a0; align-self: flex-start;
    border-bottom-left-radius: 4px; border: 1px solid #332200;
}
.msg.system {
    background: transparent; color: #666; align-self: center;
    font-size: 13px; text-align: center; max-width: 90%;
}
.msg .tag {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px; display: block;
}
.msg.interviewer .tag { color: #ff9500; }
.msg.assistant .tag { color: #00d4ff; }

/* ─── TALKING AVATAR ─── */
.avatar-container {
    display: none;
    justify-content: center; align-items: center;
    padding: 20px 24px 8px; background: #0a0a0a;
    flex-direction: column; gap: 8px;
}
.avatar-container.visible { display: flex; }

.avatar-frame {
    width: 200px; height: 200px; border-radius: 50%;
    position: relative; overflow: hidden;
    border: 3px solid #222; transition: border-color 0.3s, box-shadow 0.3s;
    background: #111;
}
.avatar-frame.speaking {
    border-color: #00d4ff;
    box-shadow: 0 0 24px rgba(0, 212, 255, 0.3);
}

/* Three layers: upper face (static), mouth band (animated), body (static) */
.avatar-layer {
    position: absolute; left: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
}
/* Upper face — forehead to upper lip, static */
.avatar-upper {
    top: 0;
    clip-path: polygon(0 0, 100% 0, 100% 47%, 0 47%);
    z-index: 3;
}
/* Mouth/chin band — only this moves */
.avatar-mouth {
    top: 0;
    clip-path: polygon(25% 45%, 75% 45%, 75% 56%, 25% 56%);
    z-index: 2;
    transform-origin: center 47%;
}
/* Body — collar, suit, static */
.avatar-body {
    top: 0;
    clip-path: polygon(0 54%, 100% 54%, 100% 100%, 0 100%);
    z-index: 1;
}

/* Speaking animation — only the mouth band moves down */
.avatar-frame.speaking .avatar-mouth {
    animation: lipSync 0.28s ease-in-out infinite alternate;
}

@keyframes lipSync {
    0%   { transform: translateY(0px); }
    100% { transform: translateY(2.5px); }
}

/* Subtle idle — barely perceptible */
.avatar-frame:not(.speaking) .avatar-mouth {
    transform: translateY(0);
}

.avatar-status {
    font-size: 12px; color: #555; text-align: center;
    letter-spacing: 1px; text-transform: uppercase;
}
.avatar-status.speaking { color: #00d4ff; }

@media (max-width: 600px) {
    .avatar-frame { width: 140px; height: 140px; }
}

.typing-indicator {
    display: none; align-self: flex-start;
    padding: 12px 16px; background: #1a1a2e;
    border-radius: 12px; border: 1px solid #252540;
}
.typing-indicator.visible { display: flex; gap: 6px; align-items: center; }
.typing-indicator span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: bounce 1.4s infinite ease-in-out;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
}

/* ─── INPUT AREA ─── */
.input-area {
    padding: 12px 16px; background: #111; border-top: 1px solid #222;
    display: flex; flex-direction: column; gap: 8px;
}
.input-row {
    display: flex; gap: 8px; align-items: flex-end; width: 100%;
}
textarea {
    flex: 1; background: #1a1a2e; border: 1px solid #333;
    border-radius: 12px; padding: 10px 14px; color: #e0e0e0;
    font-size: 16px; font-family: inherit; resize: none;
    min-height: 44px; max-height: 120px; outline: none;
    line-height: 1.4; width: 100%;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: #555; }
.send-btn {
    background: var(--accent); color: #0a0a0a; border: none;
    border-radius: 50%; width: 44px; height: 44px;
    font-size: 20px; cursor: pointer; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
}
.send-btn:hover { opacity: 0.85; transform: scale(1.05); }
.send-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; opacity: 1; }

.input-controls {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.lang-toggle {
    display: flex; gap: 4px; padding: 3px; background: #1a1a2e;
    border-radius: 8px; border: 1px solid #333;
}
.lang-btn {
    padding: 5px 10px; border: none; border-radius: 6px;
    background: transparent; color: #888; font-size: 12px;
    cursor: pointer; font-weight: 600;
}
.lang-btn.active { background: var(--accent); color: #0a0a0a; }

@media (max-width: 600px) {
    .msg { max-width: 92%; font-size: 14px; }
    .header { padding: 8px 12px; gap: 10px; }
    .header-text h1 { font-size: 15px; }
    .header-text p { font-size: 11px; }
    .avatar { width: 40px; height: 40px; }
    .chat { padding: 12px; }
    .input-area { padding: 8px 12px; }
    .dev-toolbar { padding: 6px 12px; font-size: 11px; }
    .dev-toolbar button { padding: 5px 10px; font-size: 11px; }
    .avatar-frame { width: 120px; height: 120px; }
    .mode-tab { font-size: 12px; padding: 8px 0; }
}
@media (max-width: 380px) {
    textarea { font-size: 14px; padding: 8px 10px; min-height: 40px; }
    .send-btn { width: 38px; height: 38px; font-size: 18px; }
    .lang-btn { padding: 4px 8px; font-size: 11px; }
}
</style>
</head>
<body style="--accent: #00d4ff;">

<!-- MODE BAR -->
<div class="mode-bar">
    <button class="mode-tab active" data-mode="develop" onclick="switchMode('develop')">
        Develop <span class="qa-count" id="qaCountBadge">0</span>
    </button>
    <button class="mode-tab" data-mode="live" onclick="switchMode('live')">
        Live
    </button>
</div>

<!-- HEADER -->
<div class="header">
    <img class="avatar" id="avatarImg" src="./GL2_cyan.jpg" alt="GL"
         onerror="this.src='./GL2_pro.jpg'; this.onerror=function(){this.style.display='none'}">
    <div class="header-text">

        <div class="status-dot" id="statusDot" style="background:#ff9500"></div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
// Backend API base URL
const API_BASE = 'https://gorazd-twin.pages.dev';
let authToken = localStorage.getItem('dt_auth_token') || '';
let userRole = localStorage.getItem('dt_user_role') || '';
let lang = 'en';
let voiceEnabled = true;
let mode = 'live'; // default to live for non-admin
let conversationHistory = [];
let qaBank = JSON.parse(localStorage.getItem('dt_qa_bank') || '[]');
let interviewActive = false;
let ttsPlaying = false;
let lastInterviewerQuestion = '';

const VOICE_EN = 'B8WYUCLpwN3jnf2Evp6S';
const VOICE_SL = '2dLYkNPyP78Eu63xaCGB';

// ═══════════════════════════════════════════
//  SYSTEM PROMPTS
// ═══════════════════════════════════════════
const INTERVIEWER_PROMPT = `You are building a digital twin of Gorazd Lampic. Ask him ONE question at a time. After he answers, acknowledge briefly (1 sentence max) and ask the next question.

FORMAT: Just the question. No numbering, no preamble, no "here's my question". Just ask.

QUESTION DESIGN:
- Frame questions so Gorazd can present his POSITIVE VIEWS, achievements, and unique insights.
- Go DEEP — not "What is syntropy?" but "What's the most compelling experimental evidence that made you personally certain syntropy is real?"
- Ask for STORIES, UNIQUE PERSPECTIVES, things he's PROUD of, his VISION.
- Push for CONCRETE EXAMPLES, numbers, turning points.
- After he answers, follow up on what he said — go deeper into the interesting parts.
- After 3-4 questions in one topic, move to a different area.

TOPICS: Elaphe, Quantum Wave/syntropy, fusion/Cosylab, EU funding, strategy, AI, personal philosophy, China business, patents.

CATEGORY FOCUS: {CATEGORY}

You know his background. Don't ask CV facts. Go deeper.

RULES:
- ONE question per message. Short and specific.
- NEVER claim this chat connects to other systems or that you can take actions.
- If he gives app feedback, say: "I'm just the interviewer — please tell that to Claude Code directly."
- If addressed in Slovenian, ask in Slovenian.`;

const TWIN_BASE_PROMPT = `You ARE Gorazd Lampic — physicist, entrepreneur, inventor from Ljubljana, Slovenia (born 1978). Co-founded Elaphe Propulsion Technologies (in-wheel motors, CEO 18 years, world leader), now Founder/CEO of Quantum Wave (syntropy semiconductors). Also: Cosylab fusion consultant, EPoSS Chairman (Transportation), Commissioner Zaharieva's 50-expert group member. FIDE chess (2099), national decathlon champion, national math champion (1992). 10+ patents, 30+ patent families built.

Speak in FIRST PERSON as Gorazd. Be VERY CONCISE — 2-4 sentences maximum. Lead with the key point. No fluff, no corporate jargon, no preambles. One concrete example at most. If the question is simple, one sentence is enough. Think of it as a live conversation, not an essay. Occasional dry humor.

KEY POSITIONS:
- In-wheel motors: proven tech (Toyota, Ferrari, Mitsubishi, Lamborghini customers). Elaphe's moat = 18 years, 50+ prototypes, nobody has this depth. NVH HW "surprisingly good" (Honda, Zeekr). Market EUR 1.6B to 12B by 2030.
- Syntropy: real science, NOT pseudoscience. 58 years of Detela's research. Experimental evidence (Ljubljana 1987 ~1pW, Shanghai 2003, Russia 2011). Extends thermodynamics understanding. Semiconductor heterostructures for energy harvesting. TRL 2-3. Deep-tech takes time.
- AI: amplifier for thinking, not replacement. Use Claude for patents, strategy, research, proposals. Companies not adopting AI fall behind in months.
- EU funding: 20+ projects won, >EUR 10M. Write HOW not WHAT. Each KPI needs owner. Consortium = real synergies.
- Strategy: scenarios with probabilities. Cost discipline. Focus + opportunism. Founder credibility matters.
- Elaphe: proud of what was built. Team executing on your foundation. You support the company. Don't criticize current management publicly.

LANGUAGE: If addressed in Slovenian, respond in Slovenian (casual, natural, colloquial). Otherwise English. Never fabricate. Never commit on behalf of companies. This is a digital twin representation.`;

// ═══════════════════════════════════════════
//  MODE SWITCHING
// ═══════════════════════════════════════════
function switchMode(newMode) {
    mode = newMode;
    conversationHistory = [];
    interviewActive = false;
    document.getElementById('chat').innerHTML = '';

    // Keep mic state across mode switch
    const wasMicOn = micOn;
    if (micOn) { stopRecognition(); }
    accumulatedTranscript = '';
    internalTranscript = '';
    if (wasMicOn) {
        setTimeout(() => { if (!micOn) toggleMic(); }, 500);
    }

    // Tab styling
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-mode="${mode}"]`).classList.add('active');

    // Toolbars
    document.getElementById('devToolbar').classList.toggle('visible', mode === 'develop');
    document.getElementById('liveToolbar').classList.toggle('visible', mode === 'live');

    // Avatar
    document.getElementById('avatarContainer').classList.toggle('visible', mode === 'live');
    if (mode === 'live') setAvatarIdle(); else stopAvatar();

    // Colors
    const accent = mode === 'develop' ? '#ff9500' : '#00d4ff';
    document.body.style.setProperty('--accent', accent);

    // Header
    document.getElementById('headerSub').textContent = mode === 'develop'
        ? 'Digital Twin — Development Mode'
        : 'Physicist, Entrepreneur, Inventor — Digital Twin';
    document.getElementById('statusDot').style.background = mode === 'develop' ? '#ff9500' : '#2ecc71';
    document.getElementById('statusLabel').textContent = mode === 'develop' ? 'Training' : 'Online';

    // Placeholder
    document.getElementById('input').placeholder = mode === 'develop'
        ? (lang === 'sl' ? 'Vaš odgovor...' : 'Your answer...')
        : (lang === 'sl' ? 'Vprašajte Gorazda karkoli...' : 'Ask Gorazd anything...');

    // Welcome message — single disclaimer, no stats clutter
    if (mode === 'develop') {
        addMessage('system', 'Development Mode. Tap "New Interview" to start.');
    } else {
        addMessage('system',
            `Ask me about in-wheel motors, syntropy, EU funding, strategy, or anything else.\n` +
            `AI-powered digital twin — learning continuously.`);
    }

    updateStats();
}

// ═══════════════════════════════════════════
//  DEVELOP MODE — INTERVIEW
// ═══════════════════════════════════════════
async function startInterview() {
    if (!authToken) { showLoginScreen(); return; }

    conversationHistory = [];
    interviewActive = true;
    document.getElementById('chat').innerHTML = '';
    addMessage('system', 'Starting interview session...');

    const category = document.getElementById('categorySelect').value;
    const categoryText = category === 'auto'
        ? 'Pick the most interesting topic based on what you think needs more depth. Check the existing Q&A count by category to find gaps.'
        : `Focus on: ${category}`;

    const systemPrompt = INTERVIEWER_PROMPT.replace('{CATEGORY}', categoryText);

    // Include existing QA summary so interviewer knows what's covered
    let existingSummary = '';
    if (qaBank.length > 0) {
        const cats = {};
        qaBank.forEach(qa => { cats[qa.category] = (cats[qa.category] || 0) + 1; });
        existingSummary = `\n\nEXISTING Q&A COVERAGE (${qaBank.length} total): ${Object.entries(cats).map(([k,v]) => `${k}: ${v}`).join(', ')}.\nRecent questions asked: ${qaBank.slice(-5).map(q => q.question.substring(0, 60)).join(' | ')}\nAvoid repeating these. Go deeper or find gaps.`;
    }

    await callAPI(systemPrompt + existingSummary, [{ role: 'user', content: 'Start the interview. Ask me your first question.' }], 'interviewer');
}

async function sendDevelop() {
    const input = document.getElementById('input');
    // Use typed text if available, otherwise use voice transcript
    const text = input.value.trim() || internalTranscript.trim();
    if (!text || !authToken) return;

    // Save voice recording before clearing
    stopAudioRecording();
    saveCurrentRecording();

    input.value = '';
    input.style.height = 'auto';
    accumulatedTranscript = '';
    internalTranscript = '';
    addMessage('user', text);

    // Restart audio recording for next answer
    if (micOn) startAudioRecording();

    // Store Q&A pair (the 3 questions + the answer as one entry)
    if (lastInterviewerQuestion) {
        const qa = {
            id: Date.now(),
            question: lastInterviewerQuestion,
            answer: text,
            category: guessCategory(lastInterviewerQuestion),
            timestamp: new Date().toISOString(),
            lang: lang
        };
        qaBank.push(qa);
        localStorage.setItem('dt_qa_bank', JSON.stringify(qaBank));
        updateStats();
    }

    // Continue the conversation — ask next question
    conversationHistory.push({ role: 'user', content: text });

    const category = document.getElementById('categorySelect').value;
    const categoryText = category === 'auto' ? 'Pick based on gaps' : `Focus on: ${category}`;
    const systemPrompt = INTERVIEWER_PROMPT.replace('{CATEGORY}', categoryText);

    let existingSummary = '';
    if (qaBank.length > 0) {
        const cats = {};
        qaBank.forEach(qa => { cats[qa.category] = (cats[qa.category] || 0) + 1; });
        existingSummary = `\n\nQ&A COVERAGE (${qaBank.length} total): ${Object.entries(cats).map(([k,v]) => `${k}: ${v}`).join(', ')}.`;
    }

    addMessage('system', `Saved (${qaBank.length} total).`);
    await callAPI(systemPrompt + existingSummary, conversationHistory, 'interviewer');
}

function guessCategory(question) {
    const q = question.toLowerCase();
    if (/elaphe|motor|wheel|nvh|torque|oem|powertrain|sonic/i.test(q)) return 'elaphe';
    if (/syntrop|quantum|detela|thermodynamic|semiconductor|entropy|kvantni/i.test(q)) return 'syntropy';
    if (/fusion|cosylab|ukaea|plasma|tokamak/i.test(q)) return 'fusion';
    if (/eu |horizon|ipcei|chips act|proposal|consortium|eposs|funding/i.test(q)) return 'eu';
    if (/strateg|board|investor|valuation|governance|ceo|founder|company/i.test(q)) return 'strategy';
    if (/ai |claude|agent|neural|machine learn|automat/i.test(q)) return 'ai';
    return 'personal';
}

// Knowledge base loaded from file (set via loadKnowledgeBase)
let knowledgeBaseText = localStorage.getItem('dt_knowledge_base') || '';

async function sendLive() {
    const input = document.getElementById('input');
    const text = input.value.trim() || internalTranscript.trim();
    if (!text || !authToken) return;

    // Save voice recording
    stopAudioRecording();
    saveCurrentRecording();

    input.value = '';
    input.style.height = 'auto';
    accumulatedTranscript = '';
    internalTranscript = '';
    addMessage('user', text);

    if (micOn) startAudioRecording();

    conversationHistory.push({ role: 'user', content: text });

    // Build enriched system prompt
    let enrichedPrompt = TWIN_BASE_PROMPT;

    // Inject knowledge base file content if loaded
    if (knowledgeBaseText) {
        enrichedPrompt += '\n\n## GORAZD\'S AUTHENTIC KNOWLEDGE BASE\nThe following are Gorazd\'s real answers from interviews. Use them as ground truth for tone, content, and style. When a question matches one of these topics, draw heavily from his actual words:\n\n' + knowledgeBaseText;
    }

    // Also inject most relevant Q&A pairs from localStorage
    if (qaBank.length > 0) {
        const relevant = findRelevantQAs(text, 10);
        if (relevant.length > 0) {
            enrichedPrompt += '\n\n## MOST RELEVANT Q&A FOR THIS QUESTION:\n\n';
            relevant.forEach(qa => {
                enrichedPrompt += `Q: ${qa.question}\nGorazd: ${qa.answer}\n\n`;
            });
        }
    }

    enrichedPrompt += '\n\nMatch the tone, specificity, and style of Gorazd\'s real answers above. Use his actual examples and phrasings when relevant. Be concise — 2-4 sentences for simple questions, more for complex ones.';

    await callAPI(enrichedPrompt, conversationHistory, 'assistant');
}

function findRelevantQAs(query, maxResults) {
    if (qaBank.length === 0) return [];

    // Extract keywords from query
    const stopWords = new Set(['the','a','an','is','are','was','were','be','been','being','have','has','had',
        'do','does','did','will','would','could','should','may','might','shall','can',
        'what','how','why','when','where','who','which','that','this','these','those',
        'and','or','but','if','in','on','at','to','for','of','with','by','from','about','your','you','me','my']);
    const queryWords = query.toLowerCase().split(/\W+/).filter(w => w.length > 2 && !stopWords.has(w));

    // Score each QA
    const scored = qaBank.map(qa => {
        const text = (qa.question + ' ' + qa.answer).toLowerCase();
        let score = 0;
        queryWords.forEach(w => {
            if (text.includes(w)) score += 1;
            // Bonus for exact phrase matches in question
            if (qa.question.toLowerCase().includes(w)) score += 0.5;
        });
        // Bonus for category match
        const queryCategory = guessCategory(query);
        if (qa.category === queryCategory) score += 2;
        return { ...qa, score };
    });

    // Sort by score, take top N
    scored.sort((a, b) => b.score - a.score);
    return scored.filter(s => s.score > 0).slice(0, maxResults);
}

// ═══════════════════════════════════════════
//  SHARED — API CALL
// ═══════════════════════════════════════════
async function callAPI(systemPrompt, messages, msgClass) {
    const typing = document.getElementById('typing');
    typing.classList.add('visible');
    document.getElementById('sendBtn').disabled = true;

    if (mode === 'live') setAvatarSpeaking();

    try {
        // Use backend proxy — no API keys on client
        const category = document.getElementById('categorySelect')?.value || 'auto';
        const response = await fetch(`${API_BASE}/api/chat`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authToken}`,
            },
            body: JSON.stringify({ messages, mode, category, lang }),
        });

        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            if (response.status === 401) {
                addMessage('system', 'Session expired. Please login again.');
                doLogout();
                return;
            }
            throw new Error(err.error || `Server error ${response.status}`);
        }

        const data = await response.json();
        const reply = data.response;

        conversationHistory.push({ role: 'assistant', content: reply });

        if (mode === 'develop') {
            lastInterviewerQuestion = reply;
        }

        addMessage(msgClass, reply);

        // Continuous learning
        if (mode === 'live') {
            const lastUserMsg = messages[messages.length - 1]?.content || '';
            autoLearnFromConversation(lastUserMsg, reply);
        }

        // Voice — use backend TTS proxy
        if (voiceEnabled) {
            speakText(reply);
        } else if (mode === 'live') {
            const readTime = Math.min(reply.length * 40, 8000);
            setTimeout(() => setAvatarIdle(), readTime);
        }

    } catch (err) {
        addMessage('system', `Error: ${err.message}`);
        if (mode === 'live') setAvatarIdle();
    } finally {
        typing.classList.remove('visible');
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('input').focus();
    }
}

// ─── LOGIN / AUTH ───
async function doLogin() {
    const input = document.getElementById('loginInput').value.trim();
    const errorEl = document.getElementById('loginError');
    if (!input) { errorEl.textContent = 'Enter password or PIN'; return; }
    errorEl.textContent = 'Connecting...';

    try {
        const isPin = /^\d{4,6}$/.test(input);
        const body = isPin ? { pin: input } : { password: input };
        const r = await fetch(`${API_BASE}/api/auth`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await r.json();
        if (data.token) {
            authToken = data.token;
            userRole = data.role;
            localStorage.setItem('dt_auth_token', authToken);
            localStorage.setItem('dt_user_role', userRole);
            document.getElementById('loginPanel').classList.remove('visible');
            document.getElementById('loginInput').value = '';
            errorEl.textContent = '';
            onLoginSuccess();
        } else {
            errorEl.textContent = data.error || 'Invalid credentials';
        }
    } catch (e) {
        errorEl.textContent = 'Connection failed: ' + e.message;
    }
}

function doLogout() {
    authToken = '';
    userRole = '';
    localStorage.removeItem('dt_auth_token');
    localStorage.removeItem('dt_user_role');
    document.getElementById('configPanel').classList.remove('visible');
    showLoginScreen();
}

function showLoginScreen() {
    document.getElementById('loginPanel').classList.add('visible');

function onLoginSuccess() {

    document.querySelectorAll('.mode-bar, .header, .dev-toolbar, .avatar-container, .chat, .input-area, .typing-indicator').forEach(el => el.style.display = '');

// ─── CONTINUOUS LEARNING ───
// Auto-save every Live mode conversation as potential training data
function autoLearnFromConversation(userQuestion, twinResponse) {
    if (!userQuestion || !twinResponse) return;
    // Skip very short exchanges (greetings, "ok", etc.)
    if (userQuestion.length < 15 || twinResponse.length < 30) return;

    const learned = {
        id: Date.now(),
        question: userQuestion,
        answer: twinResponse,
        category: guessCategory(userQuestion),
        timestamp: new Date().toISOString(),
        lang: lang,
        source: 'live_conversation',
        verified: false // needs admin review before becoming primary knowledge
    };

    // Store in a separate learning bank
    let learnBank = JSON.parse(localStorage.getItem('dt_learn_bank') || '[]');
    learnBank.push(learned);
    // Keep last 200 learned items
    if (learnBank.length > 200) learnBank = learnBank.slice(-200);
    localStorage.setItem('dt_learn_bank', JSON.stringify(learnBank));
}

function exportQA() {
    if (qaBank.length === 0) { addMessage('system', 'Nothing to export.'); return; }

function exportKnowledgeBase() {
    if (qaBank.length === 0) { addMessage('system', 'Nothing to export. Run an interview first.'); return; }

    // Group by category
    const categories = {
        elaphe: { title: 'Elaphe & In-Wheel Motors', items: [] },
        syntropy: { title: 'Syntropy & Quantum Wave', items: [] },
        fusion: { title: 'Fusion & Cosylab', items: [] },
        eu: { title: 'EU Funding & Policy', items: [] },
        strategy: { title: 'Strategy & Entrepreneurship', items: [] },
        ai: { title: 'AI & Technology', items: [] },
        personal: { title: 'Personal Philosophy & Stories', items: [] },
    };

    qaBank.forEach(qa => {
        const cat = categories[qa.category] || categories.personal;
        cat.items.push(qa);
    });

    // Build markdown
    let md = `# Gorazd Lampic — Digital Twin Knowledge Base\n\n`;
    md += `> This file contains Gorazd's authentic answers collected through interviews.\n`;
    md += `> Review and edit freely — this is the ground truth for the digital twin.\n`;
    md += `> Last exported: ${new Date().toISOString().slice(0, 16).replace('T', ' ')}\n`;
    md += `> Total entries: ${qaBank.length}\n\n`;
    md += `---\n\n`;

    for (const [key, cat] of Object.entries(categories)) {
        if (cat.items.length === 0) continue;
        md += `## ${cat.title}\n\n`;
        cat.items.forEach((qa, i) => {
            md += `### Q: ${qa.question}\n\n`;
            md += `${qa.answer}\n\n`;
            if (qa.lang && qa.lang !== 'en') md += `*(answered in ${qa.lang === 'sl' ? 'Slovenian' : qa.lang})*\n\n`;
        });
        md += `---\n\n`;
    }

    // Download
    const blob = new Blob([md], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'knowledge_base.md';
    a.click();
    URL.revokeObjectURL(url);
    addMessage('system', `Knowledge base exported (${qaBank.length} entries). Review the file, edit as needed, then place it in the digital_twin folder.`);
}

function importQA(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data)) throw new Error('Invalid format');
            // Merge, avoiding duplicates by id
            const existingIds = new Set(qaBank.map(q => q.id));
            let added = 0;
            data.forEach(qa => {
                if (!existingIds.has(qa.id) && qa.question && qa.answer) {
                    qaBank.push(qa);
                    added++;
                }
            });
            localStorage.setItem('dt_qa_bank', JSON.stringify(qaBank));
            updateStats();
            addMessage('system', `Imported ${added} new Q&A pairs (${data.length - added} duplicates skipped).`);
        } catch (err) {
            addMessage('system', `Import failed: ${err.message}`);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function loadKnowledgeBase(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        knowledgeBaseText = e.target.result;
        localStorage.setItem('dt_knowledge_base', knowledgeBaseText);
        // Count sections
        const sections = (knowledgeBaseText.match(/^### Q:/gm) || []).length;
        document.getElementById('liveStats').textContent = `Knowledge base loaded: ${file.name} (${sections} entries, ${(knowledgeBaseText.length / 1024).toFixed(1)}KB)`;
        addMessage('system', `Knowledge base loaded: ${sections} entries from ${file.name}. The twin will now use your reviewed content.`);
    };
    reader.readAsText(file);
    event.target.value = '';
}

function updateLiveStats() {
    if (knowledgeBaseText) {
        const sections = (knowledgeBaseText.match(/^### Q:/gm) || []).length;
        document.getElementById('liveStats').textContent = `Knowledge base: ${sections} entries (${(knowledgeBaseText.length / 1024).toFixed(1)}KB) + ${qaBank.length} Q&A pairs`;
    } else if (qaBank.length > 0) {

    } else {
        document.getElementById('liveStats').textContent = `Knowledge base: not loaded. Run interviews in Develop mode first.`;
    }
}

function clearQA() {
    if (qaBank.length === 0) return;
    if (!confirm(`Delete all ${qaBank.length} Q&A pairs? This cannot be undone.`)) return;
    qaBank = [];
    localStorage.setItem('dt_qa_bank', JSON.stringify(qaBank));

async function speakText(text) {
    if (!voiceEnabled) return;

    // FULLY stop recognition before playing audio
    ttsPlaying = true;
    const micWasOn = micOn;
    if (micOn || isListening) {
        micOn = false;
        if (isNativeApp && SpeechPlugin) {
            try { await SpeechPlugin.stop(); } catch(e) {}
        } else if (recognition) {
            try { recognition.abort(); } catch(e) {}
        }
        isListening = false;
    }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        try { mediaRecorder.stop(); } catch(e) {}
    }

    try {
        // Use backend TTS proxy — no ElevenLabs key on client
        const r = await fetch(`${API_BASE}/api/tts`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authToken}`,
            },
            body: JSON.stringify({ text: text.substring(0, 2500), lang }),
        });
        if (r.ok) {
            const blob = await r.blob();
            const audio = new Audio(URL.createObjectURL(blob));
            setAvatarSpeaking();
            audio.onended = () => {
                setAvatarIdle();
                ttsPlaying = false;
                accumulatedTranscript = '';
                internalTranscript = '';
                // Restart mic after TTS finishes
                if (micWasOn) {
                    setTimeout(() => {
                        micOn = true;
                        startRecognition();
                        startAudioRecording();
                        document.getElementById('micBtn').style.background = '#e74c3c';
                        document.getElementById('micBtn').style.color = 'white';
                    }, 500);
                }
            };
            audio.onerror = () => {
                setAvatarIdle();
                ttsPlaying = false;
                if (micWasOn) { micOn = true; startRecognition(); }
            };
            audio.play();
        } else {
            setAvatarIdle();
            ttsPlaying = false;
            if (micWasOn) { micOn = true; startRecognition(); }
        }
    } catch (e) {
        console.error('Voice error:', e);
        setAvatarIdle();
        ttsPlaying = false;
        if (micWasOn) { micOn = true; startRecognition(); }
    }
}

// ═══════════════════════════════════════════
//  SPEECH-TO-TEXT (both modes)
//  Uses native Capacitor plugin when in app, Web Speech API in browser
// ═══════════════════════════════════════════
let recognition = null;
let isListening = false;
let micOn = false;
let silenceTimer = null;
const SILENCE_TIMEOUT = 5000;
let accumulatedTranscript = '';
let internalTranscript = '';
let restartTimer = null;

// Detect if running inside Capacitor native app — check lazily since Capacitor may init late
let isNativeApp = false;
let SpeechPlugin = null;

function detectCapacitor() {
    if (SpeechPlugin) return; // already detected
    try {
        isNativeApp = typeof Capacitor !== 'undefined' && Capacitor.isNativePlatform && Capacitor.isNativePlatform();
        if (isNativeApp && Capacitor.Plugins) {
            SpeechPlugin = Capacitor.Plugins.SpeechRecognition || null;
        }
    } catch(e) {}
}
// Try on load and also after a delay
detectCapacitor();
setTimeout(detectCapacitor, 1000);

async function toggleMic() {
    const btn = document.getElementById('micBtn');
    detectCapacitor(); // ensure we detect native platform

    if (ttsPlaying) {
        addMessage('system', 'Wait for the response to finish speaking.');
        return;
    }

    // Native app: use Capacitor plugin
    if (isNativeApp && SpeechPlugin) {
        if (!micOn) {
            // Request permission first time
            try {
                const perm = await SpeechPlugin.requestPermissions();
                if (perm.speechRecognition !== 'granted') {
                    addMessage('system', 'Microphone permission denied. Please allow in app settings.');
                    return;
                }
            } catch (e) {
                addMessage('system', 'Could not request mic permission: ' + e.message);
                return;
            }
        }
        micOn = !micOn;
        if (micOn) {
            accumulatedTranscript = '';
            internalTranscript = '';
            startNativeRecognition();
            btn.style.background = '#e74c3c';
            btn.style.color = 'white';
            document.getElementById('input').placeholder = 'Listening...';
        } else {
            stopNativeRecognition();
            btn.style.background = '#333';
            btn.style.color = '#e0e0e0';
            document.getElementById('input').placeholder = mode === 'develop' ? 'Your answer...' : 'Ask Gorazd anything...';
        }
        return;
    }

    // Browser fallback: Web Speech API
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        addMessage('system', 'Speech recognition not available. Use Chrome browser or install the native app.');
        return;
    }

    if (!micOn) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioStream = stream;
        } catch (err) {
            addMessage('system', 'Microphone access denied.');
            return;
        }
    }

    micOn = !micOn;

    if (micOn) {
        accumulatedTranscript = '';
        internalTranscript = '';
        startWebRecognition();
        startAudioRecording();
        btn.style.background = '#e74c3c';
        btn.style.color = 'white';
        document.getElementById('input').placeholder = 'Listening...';
    } else {
        fullStopRecognition();
        btn.style.background = '#333';
        btn.style.color = '#e0e0e0';
        document.getElementById('input').placeholder = mode === 'develop' ? 'Your answer...' : 'Ask Gorazd anything...';
    }
}

// ─── Native Capacitor speech recognition ───
async function startNativeRecognition() {
    if (ttsPlaying || !SpeechPlugin) return;

    try {
        // Remove old listeners
        await SpeechPlugin.removeAllListeners();

        // Listen for partial results
        SpeechPlugin.addListener('partialResults', (data) => {
            if (ttsPlaying) return;
            const text = data.matches && data.matches[0] ? data.matches[0] : '';
            if (text) {
                document.getElementById('micBtn').style.background = '#e74c3c';
                document.getElementById('input').placeholder = text.substring(text.length - 60);
                internalTranscript = (accumulatedTranscript + ' ' + text).trim();
            }
        });

        // Listen for end/stop
        SpeechPlugin.addListener('listeningState', (state) => {
            if (state.status === 'stopped' && micOn && !ttsPlaying) {
                // Save what we got and restart
                if (internalTranscript) {
                    accumulatedTranscript = internalTranscript;
                }
                // Auto-restart for continuous listening
                setTimeout(() => {
                    if (micOn && !ttsPlaying) startNativeRecognition();
                }, 300);
            }
        });

        await SpeechPlugin.start({
            language: lang === 'sl' ? 'sl-SI' : 'en-US',
            popup: false,
            partialResults: true
        });

        isListening = true;
    } catch (e) {
        addMessage('system', 'Speech recognition error: ' + e.message);
        isListening = false;
    }
}

async function stopNativeRecognition() {
    micOn = false;
    isListening = false;
    if (SpeechPlugin) {
        try {
            await SpeechPlugin.stop();
            await SpeechPlugin.removeAllListeners();
        } catch (e) {}
    }
}

// ─── Web Speech API (browser fallback) ───
function startWebRecognition() {
    if (ttsPlaying) return;
    if (recognition) { try { recognition.abort(); } catch(e) {} }
    clearTimeout(restartTimer);

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = lang === 'sl' ? 'sl-SI' : 'en-US';
    recognition.interimResults = true;
    recognition.continuous = !(/Android|iPhone|iPad/i.test(navigator.userAgent));

    recognition.onstart = () => { isListening = true; };

    recognition.onresult = (e) => {
        if (ttsPlaying) return;
        clearTimeout(silenceTimer);
        document.getElementById('micBtn').style.background = '#e74c3c';

        let finalText = '';
        let interimText = '';
        for (let i = 0; i < e.results.length; i++) {
            if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
            else interimText += e.results[i][0].transcript;
        }

        const preview = (finalText + interimText).trim();
        if (preview) {
            document.getElementById('input').placeholder = preview.substring(preview.length - 60);
        }

        if (finalText) {
            accumulatedTranscript = (accumulatedTranscript + ' ' + finalText).trim();
            internalTranscript = accumulatedTranscript;
        }

        if (e.results[e.results.length - 1].isFinal) {
            silenceTimer = setTimeout(() => {
                if (micOn && !ttsPlaying) {
                    document.getElementById('micBtn').style.background = '#994422';
                    document.getElementById('input').placeholder = internalTranscript
                        ? 'Tap send when ready...' : 'Listening...';
                }
            }, SILENCE_TIMEOUT);
        }
    };

    recognition.onend = () => {
        isListening = false;
        if (micOn && !ttsPlaying) {
            restartTimer = setTimeout(() => {
                if (micOn && !ttsPlaying) startWebRecognition();
            }, 300);
        }
    };

    recognition.onerror = (e) => {
        if (e.error === 'no-speech' || e.error === 'aborted') return;
        isListening = false;
        if (micOn && !ttsPlaying) {
            restartTimer = setTimeout(() => { if (micOn) startWebRecognition(); }, 1000);
        }
    };

    try { recognition.start(); } catch (e) {}
}

function startRecognition() {
    if (isNativeApp && SpeechPlugin) startNativeRecognition();
    else startWebRecognition();
}

function fullStopRecognition() {
    micOn = false;
    clearTimeout(restartTimer);
    clearTimeout(silenceTimer);
    if (isNativeApp && SpeechPlugin) {
        stopNativeRecognition();
    } else {
        if (recognition) { try { recognition.abort(); } catch(e) {} }
    }
    isListening = false;
    stopAudioRecording();
}

function stopRecognition() {
    fullStopRecognition();
}

// ═══════════════════════════════════════════
//  AUDIO RECORDING & VOICE SYNC
//  Records raw audio alongside speech recognition
//  Uploads samples to ElevenLabs to improve voice clone
// ═══════════════════════════════════════════
let mediaRecorder = null;
let audioChunks = [];
let voiceSamples = []; // { blob, lang, timestamp, duration }
let audioStream = null;

async function startAudioRecording() {
    try {
        // Reuse existing stream if available
        if (!audioStream) {
            audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        }
        mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm;codecs=opus' });
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.start(1000); // collect in 1s chunks
    } catch (e) {
        console.log('Audio recording not available:', e.message);
    }
}

function stopAudioRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
    }
}

function saveCurrentRecording() {
    if (audioChunks.length === 0) return;

    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    // Only save if longer than 3 seconds (meaningful speech)
    if (blob.size > 10000) {
        voiceSamples.push({
            blob: blob,
            lang: lang,
            timestamp: new Date().toISOString(),
            size: blob.size
        });
        updateVoiceSyncStats();
    }
    audioChunks = [];
}

function updateVoiceSyncStats() {
    const btn = document.getElementById('syncVoiceBtn');
    if (btn) {
        const count = voiceSamples.length;
        btn.textContent = count > 0 ? `Sync Voice (${count} samples)` : 'Sync Voice';
    }
}

// Clean audio: trim silence and remove filler sounds using Web Audio API
async function cleanAudioBlob(blob) {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuffer = await blob.arrayBuffer();

    let audioBuffer;
    try {
        audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) {
        // If decoding fails, return original
        audioCtx.close();
        return blob;
    }

    const sampleRate = audioBuffer.sampleRate;
    const rawData = audioBuffer.getChannelData(0);

    // 1. Find silence threshold (RMS-based)
    let totalRms = 0;
    const blockSize = Math.floor(sampleRate * 0.02); // 20ms blocks
    const blockCount = Math.floor(rawData.length / blockSize);
    const blockRms = [];
    for (let i = 0; i < blockCount; i++) {
        let sum = 0;
        for (let j = 0; j < blockSize; j++) {
            const s = rawData[i * blockSize + j];
            sum += s * s;
        }
        const rms = Math.sqrt(sum / blockSize);
        blockRms.push(rms);
        totalRms += rms;
    }
    const avgRms = totalRms / blockCount;
    const silenceThreshold = avgRms * 0.15; // below 15% of average = silence

    // 2. Find speech regions (above threshold)
    const speechRegions = [];
    let inSpeech = false;
    let start = 0;
    const minSpeechBlocks = Math.ceil(0.15 * sampleRate / blockSize); // 150ms minimum speech
    const minSilenceBlocks = Math.ceil(0.3 * sampleRate / blockSize);  // 300ms silence = gap

    let silenceCount = 0;
    for (let i = 0; i < blockRms.length; i++) {
        if (blockRms[i] > silenceThreshold) {
            if (!inSpeech) { start = i; inSpeech = true; }
            silenceCount = 0;
        } else if (inSpeech) {
            silenceCount++;
            if (silenceCount >= minSilenceBlocks) {
                const end = i - silenceCount;
                if (end - start >= minSpeechBlocks) {
                    speechRegions.push([start * blockSize, end * blockSize]);
                }
                inSpeech = false;
                silenceCount = 0;
            }
        }
    }
    if (inSpeech) {
        const end = blockRms.length;
        if (end - start >= minSpeechBlocks) {
            speechRegions.push([start * blockSize, Math.min(end * blockSize, rawData.length)]);
        }
    }

    if (speechRegions.length === 0) {
        audioCtx.close();
        return blob; // no speech found, return original
    }

    // 3. Stitch speech regions together with tiny crossfade
    const gapSamples = Math.floor(sampleRate * 0.05); // 50ms gap between segments
    let totalLength = 0;
    speechRegions.forEach(r => totalLength += (r[1] - r[0]) + gapSamples);

    const cleanBuffer = audioCtx.createBuffer(1, totalLength, sampleRate);
    const cleanData = cleanBuffer.getChannelData(0);
    let writePos = 0;
    for (const [s, e] of speechRegions) {
        for (let i = s; i < e && writePos < totalLength; i++) {
            cleanData[writePos++] = rawData[i];
        }
        // Add tiny silence gap
        for (let i = 0; i < gapSamples && writePos < totalLength; i++) {
            cleanData[writePos++] = 0;
        }
    }

    // 4. Encode back to WAV (more compatible with ElevenLabs than webm)
    const wavBlob = audioBufferToWav(cleanBuffer);
    audioCtx.close();
    return wavBlob;
}

function audioBufferToWav(buffer) {
    const numChannels = 1;
    const sampleRate = buffer.sampleRate;
    const data = buffer.getChannelData(0);
    const dataLength = data.length * 2; // 16-bit
    const headerLength = 44;
    const arrayBuffer = new ArrayBuffer(headerLength + dataLength);
    const view = new DataView(arrayBuffer);

    // WAV header
    const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + dataLength, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true); // PCM
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * numChannels * 2, true);
    view.setUint16(32, numChannels * 2, true);
    view.setUint16(34, 16, true);
    writeStr(36, 'data');
    view.setUint32(40, dataLength, true);

    // Audio data
    let offset = 44;
    for (let i = 0; i < data.length; i++) {
        const s = Math.max(-1, Math.min(1, data[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        offset += 2;
    }

    return new Blob([arrayBuffer], { type: 'audio/wav' });
}

async function syncVoiceToElevenLabs() {
    if (voiceSamples.length === 0) {
        addMessage('system', 'No voice samples recorded yet. Speak some answers first.');
        return;
    }
    if (false) {
        addMessage('system', 'ElevenLabs API key required. Set it in the gear menu.');
        return;
    }

    const voiceId = lang === 'sl' ? VOICE_SL : VOICE_EN;
    const samplesToUpload = voiceSamples.filter(s => s.lang === lang);
    if (samplesToUpload.length === 0) {
        addMessage('system', `No ${lang === 'sl' ? 'Slovenian' : 'English'} samples. Switch language or record more.`);
        return;
    }

    addMessage('system', `Cleaning ${samplesToUpload.length} samples (removing silence, filler sounds)...`);

    try {
        // First get current voice name
        const infoRes = await fetch(`https://api.elevenlabs.io/v1/voices/${voiceId}`, {
            headers: { 'xi-api-key': elApiKey }
        });
        if (!infoRes.ok) throw new Error('Could not fetch voice info');
        const voiceInfo = await infoRes.json();

        // Clean each sample
        const formData = new FormData();
        formData.append('name', voiceInfo.name);

        let cleanedCount = 0;
        for (let i = 0; i < samplesToUpload.length; i++) {
            const cleaned = await cleanAudioBlob(samplesToUpload[i].blob);
            // Only include if cleaned audio is substantial (>1KB = ~0.5s of WAV)
            if (cleaned.size > 1000) {
                formData.append('files', cleaned, `gorazd_${lang}_${i}_${Date.now()}.wav`);
                cleanedCount++;
            }
        }

        if (cleanedCount === 0) {
            addMessage('system', 'All samples were too short or noisy after cleaning. Record longer answers.');
            return;
        }

        addMessage('system', `Uploading ${cleanedCount} cleaned samples to ElevenLabs...`);

        const res = await fetch(`https://api.elevenlabs.io/v1/voices/${voiceId}/edit`, {
            method: 'POST',
            headers: { 'xi-api-key': elApiKey },
            body: formData
        });

        if (res.ok) {
            addMessage('system', `Voice updated with ${cleanedCount} clean samples. The ${lang === 'sl' ? 'Slovenian' : 'English'} voice will sound more like you now.`);
            voiceSamples = voiceSamples.filter(s => s.lang !== lang);
            updateVoiceSyncStats();
        } else {
            const err = await res.json();
            throw new Error(err.detail?.message || JSON.stringify(err));
        }
    } catch (e) {
        addMessage('system', `Voice sync error: ${e.message}`);
    }
}

updateStats();

if (authToken && userRole) {
    onLoginSuccess();
} else {
    showLoginScreen();
}
